name: Sync upstream & merge-forward skill branches

on:
  # Triggered by upstream repo via repository_dispatch
  repository_dispatch:
    types: [upstream-main-updated]
  # Fallback: run on a schedule in case dispatch isn't configured
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: fork-sync
  cancel-in-progress: true

jobs:
  sync-and-pr:
    if: github.repository != 'qwibitai/nanoclaw'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for upstream changes
        id: check
        run: |
          git remote add upstream https://github.com/qwibitai/nanoclaw.git
          git fetch upstream main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date with upstream main."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Count new commits for PR description
          COMMIT_COUNT=$(git rev-list HEAD..upstream/main --count)
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$(git rev-parse upstream/main)" >> "$GITHUB_OUTPUT"

      - name: Check for existing sync PR
        if: steps.check.outputs.has_changes == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          # Close any stale sync PRs (superseded by newer upstream changes)
          EXISTING=$(gh pr list --label upstream-sync --state open --json number,headRefName --jq '.[].number')
          if [ -n "$EXISTING" ]; then
            for PR_NUM in $EXISTING; do
              gh pr close "$PR_NUM" --comment "Superseded by newer upstream changes." --delete-branch || true
            done
          fi

      - name: Create sync branch and merge
        if: steps.check.outputs.has_changes == 'true'
        id: sync
        run: |
          BRANCH="upstream-sync/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"

          if ! git merge upstream/main --no-edit; then
            echo "::error::Failed to merge upstream/main — conflicts detected"
            git merge --abort
            echo "merge_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "merge_failed=false" >> "$GITHUB_OUTPUT"

      - name: Validate: npm install & type check
        if: steps.check.outputs.has_changes == 'true' && steps.sync.outputs.merge_failed == 'false'
        id: validate_types
        run: |
          npm ci
          if ! npx tsc --noEmit; then
            echo "type_check_failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "type_check_failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate: templates exist
        if: steps.check.outputs.has_changes == 'true' && steps.sync.outputs.merge_failed == 'false'
        id: validate_templates
        run: |
          MISSING=""
          for f in templates/global.md templates/main.md; do
            if [ ! -s "$f" ]; then
              MISSING="$MISSING $f"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::warning::Missing template files:$MISSING"
            echo "templates_missing=true" >> "$GITHUB_OUTPUT"
          else
            echo "templates_missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate: build
        if: steps.check.outputs.has_changes == 'true' && steps.sync.outputs.merge_failed == 'false'
        id: validate_build
        run: |
          if ! npm run build; then
            echo "build_failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate: tests
        if: steps.check.outputs.has_changes == 'true' && steps.sync.outputs.merge_failed == 'false' && steps.validate_build.outputs.build_failed == 'false'
        id: validate_tests
        run: |
          if ! npm test; then
            echo "tests_failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests_failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate: Docker image build
        if: steps.check.outputs.has_changes == 'true' && steps.sync.outputs.merge_failed == 'false'
        id: validate_docker
        run: |
          if ! docker build -t nanoclaw-agent:ci-test ./container; then
            echo "docker_failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker_failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build validation summary
        if: steps.check.outputs.has_changes == 'true' && steps.sync.outputs.merge_failed == 'false'
        id: summary
        run: |
          PASS=true
          NOTES=""

          if [ "${{ steps.validate_types.outputs.type_check_failed }}" = "true" ]; then
            PASS=false
            NOTES="$NOTES\n- :x: Type check failed"
          else
            NOTES="$NOTES\n- :white_check_mark: Type check passed"
          fi

          if [ "${{ steps.validate_templates.outputs.templates_missing }}" = "true" ]; then
            PASS=false
            NOTES="$NOTES\n- :x: Template files missing"
          else
            NOTES="$NOTES\n- :white_check_mark: Templates valid"
          fi

          if [ "${{ steps.validate_build.outputs.build_failed }}" = "true" ]; then
            PASS=false
            NOTES="$NOTES\n- :x: Build failed"
          else
            NOTES="$NOTES\n- :white_check_mark: Build passed"
          fi

          if [ "${{ steps.validate_tests.outputs.tests_failed }}" = "true" ]; then
            PASS=false
            NOTES="$NOTES\n- :x: Tests failed"
          else
            NOTES="$NOTES\n- :white_check_mark: Tests passed"
          fi

          if [ "${{ steps.validate_docker.outputs.docker_failed }}" = "true" ]; then
            PASS=false
            NOTES="$NOTES\n- :x: Docker image build failed"
          else
            NOTES="$NOTES\n- :white_check_mark: Docker image builds"
          fi

          echo "all_passed=$PASS" >> "$GITHUB_OUTPUT"
          # Use delimiter for multiline output
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Push sync branch
        if: steps.check.outputs.has_changes == 'true' && steps.sync.outputs.merge_failed == 'false'
        run: |
          git push origin "${{ steps.sync.outputs.branch }}"

      - name: Create pull request
        if: steps.check.outputs.has_changes == 'true' && steps.sync.outputs.merge_failed == 'false'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          COMMIT_COUNT="${{ steps.check.outputs.commit_count }}"
          ALL_PASSED="${{ steps.summary.outputs.all_passed }}"
          UPSTREAM_SHA="${{ steps.check.outputs.upstream_sha }}"

          # Generate commit list for PR body
          COMMIT_LOG=$(git log HEAD~${COMMIT_COUNT}..HEAD --oneline --no-merges | head -20)
          if [ "$(git log HEAD~${COMMIT_COUNT}..HEAD --oneline --no-merges | wc -l)" -gt 20 ]; then
            COMMIT_LOG="$COMMIT_LOG
          ... and more"
          fi

          # Changed files summary
          CHANGED_FILES=$(git diff origin/main --name-only | head -30)

          if [ "$ALL_PASSED" = "true" ]; then
            TITLE="Upstream sync: ${COMMIT_COUNT} new commit(s) — all checks pass"
            LABELS="upstream-sync,awaiting-ren-review"
          else
            TITLE="Upstream sync: ${COMMIT_COUNT} new commit(s) — checks failing"
            LABELS="upstream-sync,awaiting-ren-review,ci-failing"
          fi

          PR_URL=$(gh pr create \
            --title "$TITLE" \
            --label "$LABELS" \
            --body "$(cat <<EOF
          ## Upstream Sync

          Merging **${COMMIT_COUNT} commit(s)** from \`qwibitai/nanoclaw\` main (\`${UPSTREAM_SHA:0:7}\`).

          ### CI Validation
          ${{ steps.summary.outputs.notes }}

          ### Commits
          \`\`\`
          ${COMMIT_LOG}
          \`\`\`

          ### Changed files
          \`\`\`
          ${CHANGED_FILES}
          \`\`\`

          ---
          **Ren**: Please review this PR for compatibility with our Docker-based setup, .env handling, container mounts, and any breaking changes to the agent-runner or IPC system. Approve and merge if safe, or flag concerns.
          EOF
          )")

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Created PR: $PR_URL"

      - name: Open issue for merge conflict
        if: steps.check.outputs.has_changes == 'true' && steps.sync.outputs.merge_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream sync failed — merge conflict`,
              body: [
                'The automated sync with `qwibitai/nanoclaw` main failed due to merge conflicts.',
                '',
                'To resolve manually:',
                '```bash',
                'git fetch upstream main',
                'git merge upstream/main',
                '# resolve conflicts',
                'npm run build && npm test',
                'git push',
                '```',
              ].join('\n'),
              labels: ['upstream-sync']
            });

  # Skill branch merge-forward only runs after PRs are merged to main
  merge-forward-skills:
    if: github.repository != 'qwibitai/nanoclaw' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into skill branches
        id: merge
        run: |
          git fetch origin

          FAILED=""
          SUCCEEDED=""

          SKILL_BRANCHES=$(git branch -r --list 'origin/skill/*' | sed 's|origin/||' | xargs)

          if [ -z "$SKILL_BRANCHES" ]; then
            echo "No skill branches found."
            exit 0
          fi

          for BRANCH in $SKILL_BRANCHES; do
            SKILL_NAME=$(echo "$BRANCH" | sed 's|skill/||')
            echo ""
            echo "=== Processing $BRANCH ==="

            git checkout -B "$BRANCH" "origin/$BRANCH"

            if ! git merge main --no-edit; then
              echo "::warning::Merge conflict in $BRANCH"
              git merge --abort
              FAILED="$FAILED $SKILL_NAME"
              continue
            fi

            if git diff --quiet "origin/$BRANCH"; then
              echo "$BRANCH is already up to date with main."
              SUCCEEDED="$SUCCEEDED $SKILL_NAME"
              continue
            fi

            npm ci

            if ! npm run build; then
              echo "::warning::Build failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $SKILL_NAME"
              continue
            fi

            if ! npm test; then
              echo "::warning::Tests failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $SKILL_NAME"
              continue
            fi

            git push origin "$BRANCH"
            SUCCEEDED="$SUCCEEDED $SKILL_NAME"
            echo "$BRANCH merged and pushed successfully."
          done

          echo ""
          echo "=== Results ==="
          echo "Succeeded: $SUCCEEDED"
          echo "Failed: $FAILED"

          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "succeeded=$SUCCEEDED" >> "$GITHUB_OUTPUT"

      - name: Open issue for failed skill merges
        if: steps.merge.outputs.failed != ''
        uses: actions/github-script@v7
        with:
          script: |
            const failed = '${{ steps.merge.outputs.failed }}'.trim().split(/\s+/);
            const body = [
              `The merge-forward workflow failed to merge \`main\` into the following skill branches:`,
              '',
              ...failed.map(s => `- \`skill/${s}\`: merge conflict, build failure, or test failure`),
              '',
              'Please resolve manually:',
              '```bash',
              ...failed.map(s => [
                `git checkout skill/${s}`,
                `git merge main`,
                `# resolve conflicts, then: git push`,
                ''
              ]).flat(),
              '```',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Merge-forward failed for ${failed.length} skill branch(es)`,
              body,
              labels: ['skill-maintenance']
            });
